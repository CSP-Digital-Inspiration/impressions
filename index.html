<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magazine Archive</title>

<style>
/* 🌄 Background Image */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url('https://wallpapershome.com/images/pages/ico_h/17391.jpg') no-repeat center center/cover;
    height: 100vh;
    color: white;
    text-align: center;
}

/* 🌫️ Glass overlay */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(0px);
    z-index: -1;
}

/* 🏷 Header */
header {
    padding: 30px 10px;
    font-size: 30px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* 📦 Container */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

/* 💎 Glass Buttons */
.btn {
    background: rgba(255, 255, 255, 0.15);
    color: white;
    padding: 20px;
    border-radius: 15px;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
    transition: 0.3s;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

/* ✨ Hover Effect */
.btn:hover {
    background: rgba(255, 255, 255, 0.35);
    color: black;
    transform: scale(1.07);
}

/* 📄 Footer */
footer {
    margin-top: 20px;
    padding: 10px;
    font-size: 14px;
    opacity: 0.8;
}

/* 📱 Mobile */
@media (max-width: 500px) {
    header {
        font-size: 22px;
    }
    .btn {
        font-size: 16px;
        padding: 15px;
    }
}
</style>

</head>

<body>

<header>
    📚 College Magazine
</header>

<div class="container">

    <!-- Replace links with your real PDFs -->

    <a href="https://example.com/magazine2020.pdf" target="_blank" class="btn">Magazine 2020</a>
    <a href="https://example.com/magazine2021.pdf" target="_blank" class="btn">Magazine 2021</a>
    <a href="https://example.com/magazine2022.pdf" target="_blank" class="btn">Magazine 2022</a>
    <a href="https://example.com/magazine2023.pdf" target="_blank" class="btn">Magazine 2023</a>
    <a href="https://example.com/magazine2024.pdf" target="_blank" class="btn">Magazine 2024</a>

    <a href="https://example.com/magazine2025.pdf" target="_blank" class="btn">Magazine 2025</a>
    <a href="https://example.com/magazine2026.pdf" target="_blank" class="btn">Magazine 2026</a>

</div>

<footer>
    © 2026 Your Magazine | All Rights Reserved
</footer>

</body>
</html>
